<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格OTPジェネレーター</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        h3 { margin-top: 0; color: #333; font-size: 1.1rem; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: border-color 0.3s; font-family: monospace; }
        input:focus { border-color: var(--primary); }
        .otp-container { position: relative; margin: 20px 0; cursor: pointer; transition: transform 0.1s; }
        .otp-container:active { transform: scale(0.95); }
        .otp { font-size: 3.5rem; font-weight: 800; color: var(--primary); letter-spacing: 4px; font-variant-numeric: tabular-nums; }
        .copy-hint { font-size: 0.8rem; color: #999; margin-bottom: 10px; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s linear; }
        #copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>秘密鍵 (Base32)</h3>
    <input type="text" id="secret-input" placeholder="例: JBSWY3DPEHPK3PXP" value="JBSWY3DPEHPK3PXP" spellcheck="false">
    
    <div class="copy-hint">クリックしてコピー</div>
    <div class="otp-container" id="otp-target">
        <div id="otp-display" class="otp">------</div>
    </div>
    
    <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="timer-text" style="color:#666; font-size:0.85rem;">更新まで: --秒</div>
</div>

<div id="copy-toast">コピーしました！</div>

<script>
/**
 * OTP生成ロジック (TOTP)
 */
const OTP = {
    // Base32をバイナリに変換
    base32ToBuf(base32) {
        base32 = base32.replace(/\s/g, "").toUpperCase();
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        let bits = "";
        for (let i = 0; i < base32.length; i++) {
            let val = alphabet.indexOf(base32[i]);
            if (val >= 0) bits += val.toString(2).padStart(5, '0');
        }
        const buf = new Uint8Array(Math.floor(bits.length / 8));
        for (let i = 0; i < buf.length; i++) {
            buf[i] = parseInt(bits.substring(i * 8, i * 8 + 8), 2);
        }
        return buf;
    },

    // 6桁の数字を計算
    async generate(secret) {
        try {
            const secretBuf = this.base32ToBuf(secret);
            if (secretBuf.length === 0) return "------";

            const epoch = Math.floor(Date.now() / 1000 / 30);
            const timeBuf = new Uint8Array(8);
            new DataView(timeBuf.buffer).setUint32(4, epoch);

            const key = await crypto.subtle.importKey(
                "raw", secretBuf, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
            );
            const hmac = await crypto.subtle.sign("HMAC", key, timeBuf);
            const res = new Uint8Array(hmac);

            const offset = res[res.length - 1] & 0xf;
            const code = ((res[offset] & 0x7f) << 24 | (res[offset+1] & 0xff) << 16 | (res[offset+2] & 0xff) << 8 | (res[offset+3] & 0xff)) % 1000000;
            return code.toString().padStart(6, '0');
        } catch (e) {
            return "ERROR";
        }
    }
};

/**
 * UI制御
 */
const elInput = document.getElementById("secret-input");
const elDisplay = document.getElementById("otp-display");
const elProgress = document.getElementById("progress-fill");
const elTimerText = document.getElementById("timer-text");
const elToast = document.getElementById("copy-toast");

async function updateUI() {
    const secret = elInput.value.trim();
    const code = await OTP.generate(secret);
    elDisplay.innerText = code;

    // タイマー計算
    const now = Math.floor(Date.now() / 1000);
    const remaining = 30 - (now % 30);
    elTimerText.innerText = `更新まで: ${remaining}秒`;
    elProgress.style.width = (remaining / 30 * 100) + "%";
}

// コピー機能
document.getElementById("otp-target").addEventListener("click", () => {
    const code = elDisplay.innerText;
    if (code.includes("-") || code === "ERROR") return;

    navigator.clipboard.writeText(code).then(() => {
        elToast.style.opacity = "1";
        setTimeout(() => elToast.style.opacity = "0", 1500);
    });
});

// イベント登録
setInterval(updateUI, 1000);
elInput.addEventListener("input", updateUI);
updateUI();
</script>

</body>
</html>
